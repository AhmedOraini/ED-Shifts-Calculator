<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ED Shift Calculator</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            margin-top: 20px;
        }
        .header-box { text-align: center; margin-bottom: 20px; }
        .lang-switch { text-align: right; margin-bottom: 20px; }
        button.lang-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--primary); }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .result-card {
            background: #ecf0f1;
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 2rem;
            text-align: center;
            border-left: 5px solid var(--accent);
        }
        #finalShifts { font-size: 2.5rem; color: var(--accent); display: block; margin-top: 10px; }
        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 20px;
            color: var(--primary);
            line-height: 1.6;
        }
        [dir="rtl"] .lang-switch { text-align: left; }
        [dir="rtl"] .result-card { border-left: none; border-right: 5px solid var(--accent); }
        .ar { display: none; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="lang-switch">
        <button class="lang-btn" onclick="toggleLanguage()">English / العربية</button>
    </div>

    <div class="header-box">
        <h2 class="en">ED Shift Calculator (<span id="yearDisplayEn"></span>)</h2>
        <h2 class="ar">حاسبة شفتات الطوارئ لعام (<span id="yearDisplayAr"></span>)</h2>
    </div>

    <div class="form-group">
        <label class="en">Select Month</label>
        <label class="ar">اختر الشهر</label>
        <select id="monthSelect" onchange="updateMonthInfo()"></select>
    </div>

    <div style="text-align: center; margin-bottom: 15px; font-size: 0.9rem; color: #7f8c8d;">
        <span class="en">Total Days in this month: </span>
        <span class="ar">إجمالي أيام الشهر: </span>
        <b id="daysDisplay">--</b>
    </div>

    <div class="form-group">
        <label class="en">Target Monthly Shifts</label>
        <label class="ar">عدد الشفتات المطلوبة في الشهر</label>
        <input type="number" id="target" value="18" step="0.5" oninput="calculate()">
    </div>

    <div class="form-group">
        <label class="en">Days Off / Vacation</label>
        <label class="ar">أيام الإجازة / الأوف</label>
        <input type="number" id="offDays" value="0" step="1" oninput="calculate()">
    </div>

    <div class="result-card">
        <span class="en">Calculated Shifts:</span>
        <span class="ar">الشفتات المستحقة:</span>
        <strong id="finalShifts">0</strong>
    </div>

    <div class="footer">
        <strong>Created by Dr. Ahmed Aloraini<br>@AhmedOraini</strong>
    </div>
</div>

<script>
    const monthsEn = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const monthsAr = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
    
    // System Year & Month
    const systemDate = new Date();
    const currentYear = systemDate.getFullYear();
    const currentMonthIndex = systemDate.getMonth();

    document.getElementById('yearDisplayEn').innerText = currentYear;
    document.getElementById('yearDisplayAr').innerText = currentYear;

    function init() {
        const select = document.getElementById('monthSelect');
        monthsEn.forEach((month, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.text = `${month} / ${monthsAr[index]}`;
            if (index === currentMonthIndex) option.selected = true;
            select.appendChild(option);
        });
        updateMonthInfo();
    }

    function updateMonthInfo() {
        const monthIndex = parseInt(document.getElementById('monthSelect').value);
        // This line is the magic: it finds the last day of the month for the current system year
        const daysInMonth = new Date(currentYear, monthIndex + 1, 0).getDate();
        document.getElementById('daysDisplay').innerText = daysInMonth;
        calculate();
    }

    function calculate() {
        const monthIndex = parseInt(document.getElementById('monthSelect').value);
        const totalDays = new Date(currentYear, monthIndex + 1, 0).getDate();
        const target = parseFloat(document.getElementById('target').value) || 0;
        const offDays = parseFloat(document.getElementById('offDays').value) || 0;

        // Your specific formula
        const result = ((totalDays - offDays) / totalDays) * target;

        document.getElementById('finalShifts').innerText = result.toFixed(2);
    }

    function toggleLanguage() {
        const body = document.body;
        const isEn = body.getAttribute('dir') === 'ltr';
        body.setAttribute('dir', isEn ? 'rtl' : 'ltr');
        document.querySelectorAll('.en').forEach(el => el.style.display = isEn ? 'none' : 'block');
        document.querySelectorAll('.ar').forEach(el => el.style.display = isEn ? 'block' : 'none');
    }

    init();
</script>

</body>
</html>
